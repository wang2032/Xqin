services:
  app:
    image: ${APP_IMAGE:-ghcr.io/CHANGE_ME/i_love_day:latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18923}:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-i_love_day}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CHARSET: utf8mb4
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_DEBUG: ${APP_DEBUG:-}
    volumes:
      - ./data/uploads:/var/www/html/uploads
      - app_state:/var/www/state
    extra_hosts:
      # 让容器能通过 host.docker.internal 访问宿主机上已有的 MySQL
      - "host.docker.internal:host-gateway"

volumes:
  app_state:
